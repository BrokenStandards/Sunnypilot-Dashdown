name: android-ci

on:
  push:
    branches: [main]
  pull_request:

# iOS is intentionally NOT built in GitHub Actions: it needs a Darwin SDK built
# from an Apple-licensed Xcode.xip, which can't live in public CI. iOS build
# verification runs locally via tools/ios-build.sh (Docker: Swift + xtool); a
# hosted iOS build is a Phase C decision (Linux+xtool vs a macOS runner).

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: assemble (cargo-ndk + bindgen + APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Provision Rust toolchain (channel + targets from rust-toolchain.toml)
        run: rustup show

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK + platform + build-tools
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" "ndk;27.3.13750724" "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Gradle assembleDebug + unit tests + ktfmt check (:app + :core)
        working-directory: android
        run: ./gradlew :app:assembleDebug :core:assembleDebug :app:testDebugUnitTest ktfmtCheck --stacktrace

      - name: Upload APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 5

  connected-check:
    name: on-device tests (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Provision Rust toolchain
        run: rustup show

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK + platform + build-tools
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" "ndk;27.3.13750724" "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run :core + :app connected tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: aosp_atd
          arch: x86_64
          working-directory: android
          # :app live tests (DrivesSync/DownloadService/DriveExport/AutoSyncWorker/
          # Connectivity.reachable) self-skip without a `mockPort` arg, so only the
          # hermetic UI + core tests run here. unreachableDeviceShowsRed runs (no server needed).
          script: ./gradlew :core:connectedDebugAndroidTest :app:connectedDebugAndroidTest --stacktrace

      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: connected-reports
          path: android/**/build/reports
          retention-days: 5
