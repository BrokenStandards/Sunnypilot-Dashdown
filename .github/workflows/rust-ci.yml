name: rust-ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: build · test · cross-compile · bindgen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # rust-toolchain.toml pins the channel, components, and all targets.
      - name: Provision toolchain
        run: rustup show

      # Real-copyparty contract test (tests/it_real_copyparty.rs) needs the
      # copyparty binary on PATH; it skips gracefully if absent.
      - name: Install copyparty
        run: |
          pipx install copyparty
          copyparty --version

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (host, incl. real-copyparty contract test)
        run: cargo test --workspace

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android cdylib (4 ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o target/jniLibs build -p dashdown-core --release

      # iOS cross-compile is DEFERRED to Phase B. As of M1 the core has C
      # dependencies (bundled SQLite + rustls/aws-lc-rs) that cannot be compiled
      # for aarch64-apple-ios on a bare Linux runner (no Apple C cross-compiler:
      # CC_aarch64-apple-ios is unset). Phase B builds iOS via xtool's Swift SDK,
      # which provides the Apple clang + SDK. The iOS Rust std targets remain
      # installed (rust-toolchain.toml) for that work.

      - name: Generate + verify bindings (Kotlin + Swift)
        run: |
          bash tools/gen-bindings.sh
          kt=target/bindings/kotlin/uniffi/dashdown_core/dashdown_core.kt
          sw=target/bindings/swift/dashdown_core.swift
          test -f "$kt" && test -f "$sw"
          # M0 smoke exports (still present).
          grep -q 'func ping('   "$sw"
          grep -q 'pingAsync'    "$sw"
          grep -q 'pingAsync'    "$kt"
          # M8 AppCore surface: assert the facade, objects, callbacks, error and a
          # settings record generated in BOTH languages. Bare case-insensitive
          # substrings tolerate decl-style differences (Swift `open func`, Kotlin
          # backtick-quoted `addDevice`, Error->Exception rename).
          for sym in AppCore addDevice listDevices syncNow startDriveDownload \
                     checkConnectivity exportDriveZip runMaintenance SyncHandle cancel \
                     ProgressSink LogSink CoreError DeviceSettings DriveSyncStatus; do
            grep -qi "$sym" "$sw" || { echo "missing '$sym' in swift bindings"; exit 1; }
            grep -qi "$sym" "$kt" || { echo "missing '$sym' in kotlin bindings"; exit 1; }
          done
          # The tokio-async export path must generate suspend funcs in Kotlin /
          # async throws in Swift.
          grep -qi 'suspend fun' "$kt" || { echo "no suspend funcs in kotlin"; exit 1; }
          grep -qi 'async throws' "$sw" || { echo "no async throws in swift"; exit 1; }
          echo "bindings smoke OK"
