# Add a device through the UI. Pass args with -e (tools/dd-ui.sh supplies PORT
# and WIFI_IP defaults if omitted):
#   NAME     device name
#   IP       primary IP (goes in the "Hotspot IP" field)
#   PORT     copyparty port (default 8080 via dd-ui.sh)
#   WIFI_IP  optional second IP (the "Home/Wi-Fi IP" field) for multi-IP testing
# NOTE: no flow-level `env:` block — a flow `env:` shadows CLI `-e` in Maestro,
# so all args come from `-e` (dd-ui.sh) to keep them overridable.
# Leaves the Dongle ID blank so first-connect detection runs, then auto-confirms
# the detected id if the dialog appears (a no-op when the device is unreachable).
appId: org.sunnypilot.dashdown
---
- launchApp
- tapOn:
    id: "add_device_fab"
- tapOn:
    id: "device_form_name"
- inputText: "${NAME}"
- tapOn:
    id: "device_form_hotspot_ip"
- eraseText
- inputText: "${IP}"
- runFlow:
    when:
      true: ${WIFI_IP != ''}
    commands:
      - tapOn:
          id: "device_form_wifi_ip"
      - inputText: "${WIFI_IP}"
- tapOn:
    id: "device_form_port"
- eraseText
- inputText: "${PORT}"
- hideKeyboard
- tapOn:
    id: "device_form_save"
# Detected-dongle confirm dialog (only when reachable + Dongle ID left blank).
- tapOn:
    text: "Use it"
    optional: true
